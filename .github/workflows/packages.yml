name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: ${{ matrix.name }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            bundles: dmg
            artifact: clodx-macos-arm64
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
            artifact: clodx-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm run tauri build -- --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
