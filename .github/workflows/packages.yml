name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.name }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15-intel
            bundles: dmg
            artifact: clodx-macos-x64
          - name: macOS Apple Silicon
            os: macos-14
            bundles: app
            artifact: clodx-macos-arm64
            archive_app: true
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
            artifact: clodx-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm run tauri build -- --bundles ${{ matrix.bundles }}
      - name: Archive Apple Silicon app
        if: matrix.archive_app
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          src-tauri/target/release/bundle/macos/Clodx.app
          src-tauri/target/release/bundle/macos/Clodx-macos-arm64.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release and attach installers
        uses: softprops/action-gh-release@v2
        with:
          name: Clodx ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.msi
            release-assets/**/*.exe
          fail_on_unmatched_files: true
